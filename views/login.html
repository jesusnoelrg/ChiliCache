<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inicio de sesión</title>
  <!-- Bootstrap -->
  <link rel="stylesheet" href="/css/bootstrap.min.css">
  <!--CSS my styles -->
  <link rel="stylesheet" href="/css/general.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/variables.css">
  <!--Logo-->
  <link rel="shortcut icon" href="/img/logo.png" type="image/x-icon">
</head>

<body>
  <div class="container-fluid d-flex justify-content-center align-items-center h-100 login-background">
    <div class="login-card bg-white shadow rounded-10">
      <div class="p-5 d-flex flex-column justify-content-center align-items-center">
        <img src="/img/logo.png" width="185px" height="150px" alt="Logotipo">
        <h2 class="text-center fw-bold my-4">Inicio de sesión</h2>
        <form id="loginForm" class="container px-3">
          <p id="errorMsg" class="text-center form-message-error"></p>
          <div class="form-floating">
            <input type="text" class="form-control" id="floatingUsername" placeholder="Nombre de usuario">
            <label for="floatingUsername" class="text-gray"><i class="bi bi-person-fill"></i> Nombre de usuario</label>
          </div>
          <div class="form-floating my-4">
            <input type="password" class="form-control" id="floatingPassword" placeholder="Contraseña">
            <label for="floatingPassword" class="text-gray"><i class="bi bi-lock-fill"></i> Contraseña</label>
          </div>
          <div class="w-100 d-flex justify-content-center">
            <button type="submit" id="btnSubmit" class="btn-primario px-5 py-2 fs-5 rounded-10 shadow">Iniciar
              sesión</button>
          </div>
        </form>
      </div>
    </div>
  </div>
  <script src="/js/utils/auth-global.js"></script>
</body>

</html>
